# 視覚回帰 baseline 生成ワークフロー (PR #96)
#
# 目的:
#   Linux CI 環境 (Ubuntu + Playwright Chromium) で baseline PNG を生成し、
#   トリガしたブランチに自動 commit する。フォント/アンチエイリアスの差異を
#   吸収するため、Windows / macOS ローカルではなく CI で生成する方針。
#
# 使い方:
#   1. GitHub Actions UI → "E2E Visual Baseline" → "Run workflow" を押下
#   2. ブランチを選んで実行 (対象 PR の feature branch を選ぶのが通常)
#   3. 実行完了後、同ブランチに「Update visual baselines (workflow)」の
#      commit が追加される
#   4. PR を再度 push すれば視覚回帰が green になる
#
# 実行タイミング (手動のみ):
#   - 初回 baseline 生成
#   - UI 意図的変更後の再生成
#   - テーマ定義 (src/config/themes.ts) 変更後
#
# 注意:
#   - main には実行しない (baseline 再生成は PR レビューの通過後に限る)
#   - PR 作成者が自ブランチで実行 → commit → push 更新される

name: E2E Visual Baseline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '対象ブランチ (既定: 現在のブランチ)'
        required: false
        type: string

permissions:
  contents: write  # PNG 自動 commit のため必須
  pull-requests: write

jobs:
  generate:
    name: Generate & commit visual baselines
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tasukiba_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tasukiba_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/tasukiba_e2e
      NEXTAUTH_SECRET: e2e_only_secret_do_not_use_in_production_32chars_min!
      MAIL_PROVIDER: inbox
      INBOX_DIR: /tmp/tasukiba-e2e-inbox
      INITIAL_ADMIN_EMAIL: admin-e2e@example.com
      INITIAL_ADMIN_PASSWORD: 'E2eInitial!Pw_2026'
      CI: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          # commit push に必要 (actions/checkout の token は fetch 専用)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Apply migrations to ephemeral DB
        run: pnpm prisma migrate deploy

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Next.js
        run: pnpm build

      - name: Prepare standalone assets
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Run Playwright with --update-snapshots
        run: pnpm exec playwright test e2e/visual --update-snapshots

      - name: Commit & push generated baselines
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual
          if git diff --cached --quiet; then
            echo "no baseline changes"
            exit 0
          fi
          git commit -m "Update visual baselines (e2e-visual-baseline workflow)"
          git push

      - name: Upload generated PNGs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-${{ github.run_id }}
          path: e2e/visual/**/*.png
          retention-days: 14
