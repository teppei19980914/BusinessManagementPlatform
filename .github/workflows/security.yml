# セキュリティスキャンワークフロー (PR #82 で .template から有効化)
#
# 実行内容:
#   1. gitleaks       — 機密情報スキャン (コミット履歴に secrets が混入していないか)
#   2. pnpm audit     — 依存パッケージの既知脆弱性スキャン
#   3. semgrep        — SAST (静的セキュリティ解析)
#   4. CodeQL         — 高度な SAST (GitHub 標準)
#
# 実行タイミング:
#   - main への push / PR
#   - 毎日 03:00 UTC の定期実行 (新規 CVE 検出のため)
#
# 注意:
#   - semgrep は SEMGREP_APP_TOKEN secret 未設定時はスキップされる (任意連携)
#   - gitleaks の有償ライセンス未設定時は free 版で動作 (基本検出は十分)

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================
  # 1. Secret Scan (gitleaks)
  # ============================================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 2. Dependency Vulnerability Scan (pnpm audit)
  # ============================================================
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Run pnpm audit
        # high 以上の脆弱性のみ失敗扱い (low / moderate は警告レベル)
        run: pnpm audit --audit-level=high

  # ============================================================
  # 3. SAST - Semgrep (SEMGREP_APP_TOKEN 設定時のみ有効)
  # ============================================================
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    if: ${{ secrets.SEMGREP_APP_TOKEN != '' }}
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ============================================================
  # 4. CodeQL (高度な SAST)
  # ============================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
