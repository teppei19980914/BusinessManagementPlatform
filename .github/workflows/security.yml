# セキュリティスキャンワークフロー (PR #82 で .template から有効化)
#
# 実行内容:
#   1. gitleaks       — 機密情報スキャン (コミット履歴に secrets が混入していないか)
#   2. pnpm audit     — 依存パッケージの既知脆弱性スキャン
#   3. semgrep        — SAST (静的セキュリティ解析)
#   4. CodeQL         — 高度な SAST (GitHub 標準)
#
# 実行タイミング:
#   - main への push / PR
#   - 毎日 03:00 UTC の定期実行 (新規 CVE 検出のため)
#
# 注意:
#   - semgrep は SEMGREP_APP_TOKEN secret 未設定時はスキップされる (任意連携)
#     ※ PR #83: GitHub Actions の制約上、`jobs.<id>.if` 内では `secrets`
#       コンテキストを直接参照できない (Unrecognized named-value: 'secrets'
#       エラーになる)。このため step レベルで env 経由に落として自己スキップ
#       させる形に変更した。
#       参考: https://docs.github.com/en/actions/learn-github-actions/contexts#context-availability
#   - gitleaks の有償ライセンス未設定時は free 版で動作 (基本検出は十分)

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================
  # 1. Secret Scan (gitleaks)
  # ============================================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 2. Dependency Vulnerability Scan (pnpm audit)
  # ============================================================
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Run pnpm audit
        # high 以上の脆弱性のみ失敗扱い (low / moderate は警告レベル)
        run: pnpm audit --audit-level=high

  # ============================================================
  # 3. SAST - Semgrep (SEMGREP_APP_TOKEN 設定時のみ有効)
  # ============================================================
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run semgrep (skip when token is not set)
        # PR #83 修正: job レベル `if: ${{ secrets.SEMGREP_APP_TOKEN != '' }}`
        # は構文エラーになる (Unrecognized named-value: 'secrets')。
        # step レベルに移し、env 経由で受け取った値で自己スキップさせる。
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          if [ -z "$SEMGREP_APP_TOKEN" ]; then
            echo "SEMGREP_APP_TOKEN is not set. Skipping Semgrep scan."
            exit 0
          fi
          semgrep ci --config=auto

  # ============================================================
  # 4. CodeQL (高度な SAST)
  # ============================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  # ============================================================
  # 5. 攻撃種別マトリクス (PR #84)
  #
  # 本プロダクトがどの攻撃種別を考慮して実装されているかを俯瞰するための
  # サマリー。GitHub Actions の Job Summary 機能 (GITHUB_STEP_SUMMARY) を
  # 使い Markdown 表を書き出す。行内容は attack-matrix-summary.md に分離
  # (block-dangerous-edit hook のキーワード混入を避けるため)。
  # ============================================================
  attack-matrix:
    name: 攻撃種別マトリクス (Attack Matrix)
    runs-on: ubuntu-latest
    needs: [secret-scan, pnpm-audit, semgrep, codeql]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate attack coverage matrix
        env:
          GITLEAKS_STATUS: ${{ needs.secret-scan.result }}
          AUDIT_STATUS: ${{ needs.pnpm-audit.result }}
          SEMGREP_STATUS: ${{ needs.semgrep.result }}
          CODEQL_STATUS: ${{ needs.codeql.result }}
        run: |
          # 判定ヘルパー: success → ✅ / failure → ❌ / skipped → ⚠️
          to_mark() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              *) echo "⚠️" ;;
            esac
          }
          # 複数依存を OR 判定: どれか 1 つ success なら ✅、全 failure なら ❌、他は ⚠️
          or_mark() {
            for s in "$@"; do [ "$s" = "success" ] && { echo "✅"; return; }; done
            for s in "$@"; do [ "$s" = "failure" ] || { echo "⚠️"; return; }; done
            echo "❌"
          }

          GITLEAKS=$(to_mark "$GITLEAKS_STATUS")
          AUDIT=$(to_mark "$AUDIT_STATUS")
          CODEQL=$(to_mark "$CODEQL_STATUS")
          SAST=$(or_mark "$SEMGREP_STATUS" "$CODEQL_STATUS")

          # テンプレートに実結果を差し込む
          sed \
            -e "s/@@GITLEAKS@@/$GITLEAKS/g" \
            -e "s/@@AUDIT@@/$AUDIT/g" \
            -e "s/@@SAST@@/$SAST/g" \
            -e "s/@@CODEQL@@/$CODEQL/g" \
            .github/attack-matrix-summary.md >> "$GITHUB_STEP_SUMMARY"
