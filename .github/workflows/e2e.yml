# E2E + 視覚回帰テストワークフロー (PR #90 基盤)
#
# 実行内容:
#   1. エフェメラル Postgres (services: postgres) を起動
#   2. prisma migrate deploy でスキーマ適用
#   3. Next.js ビルド
#   4. Playwright で e2e/ 配下のシナリオ + 視覚回帰を実行
#   5. 結果を Artifact (HTML レポート + 差分スクショ) としてアップロード
#   6. PR コメントに pass/fail サマリとレポートリンクを投稿
#
# 設計判断:
#   - Node 22 LTS / pnpm 10 (既存 ci.yml と揃える)
#   - Postgres 16 (本番 Supabase と同版)
#   - Chromium のみ (多ブラウザは将来追加、MVP はコスト削減優先)
#   - retries: 2 (playwright.config.ts) で flaky 対策
#   - 視覚回帰の baseline は e2e/**__screenshots__/ に commit、PR 中は
#     開発者ローカルで `pnpm test:e2e:update-snapshots` → git commit で更新
#
# 実行タイミング:
#   - main への push / PR
#   - schedule (毎日 04:00 UTC) で main の回帰監視
#
# 関連:
#   - playwright.config.ts
#   - docs/E2E_COVERAGE.md (カバレッジマニフェスト)
#   - scripts/check-e2e-coverage.ts (gap 検出、ci.yml で別途実行)

name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: Playwright E2E + Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tasukiba_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tasukiba_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/tasukiba_e2e
      # E2E 用の固定秘密鍵 (本番環境とは独立、CI ジョブ内でのみ有効)
      NEXTAUTH_SECRET: e2e_only_secret_do_not_use_in_production_32chars_min!
      # PR #92: メール送信は inbox provider。送信内容を INBOX_DIR 配下に JSON で書き出し、
      # Playwright 側 (e2e/fixtures/inbox.ts) がトークン URL を抽出して検証する。
      MAIL_PROVIDER: inbox
      INBOX_DIR: /tmp/tasukiba-e2e-inbox
      # PR #92: シナリオ Step 1 で使用する初期 admin (E2E 実行ごとに DB にシード)
      INITIAL_ADMIN_EMAIL: admin-e2e@example.com
      INITIAL_ADMIN_PASSWORD: 'E2eInitial!Pw_2026'
      CI: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Apply migrations to ephemeral DB
        run: pnpm prisma migrate deploy

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Next.js
        run: pnpm build

      - name: Prepare standalone assets (PR #90 hotfix)
        # next.config.ts の `output: 'standalone'` により `next start` が使えない。
        # `node .next/standalone/server.js` で起動するには public/ と .next/static/ を
        # standalone ディレクトリ配下に手動コピーする必要がある (Next.js 公式手順)。
        # 参考: https://nextjs.org/docs/app/api-reference/next-config-js/output#automatically-copying-traced-files
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (diff images etc)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 14

      - name: Comment PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-report
          message: |
            ## 🎭 E2E Test Report

            **Status**: ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }}
            **Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### 📋 テストが何をしているか (コードを読まず確認したい場合)

            `e2e/README.md` を参照してください。各 spec のシナリオが日本語で一覧化されています。

            ### 🖼️ テストの挙動を画面で確認する (Artifact 活用)

            **1. 視覚的に挙動を追いたい → Playwright HTML レポート**

            - `playwright-report-${{ github.run_id }}.zip` をダウンロード
            - 解凍して `index.html` をブラウザで開く
            - 各 test の **「View Trace」** ボタンで以下が見える:
              - 各 action 毎の before / after DOM snapshot
              - ステップ毎のスクリーンショット
              - ネットワーク / コンソール ログ
              - 実行全体のビデオ再生

            **2. 節目のスクリーンショットだけ素早く見たい**

            - `playwright-test-results-${{ github.run_id }}.zip` をダウンロード
            - `steps/` 配下にラベル付き PNG が並ぶ:
              - `step-1-password-changed.png`
              - `step-2-mfa-qr-displayed.png`
              - `step-2-mfa-enabled-badge.png`
              - ...
            - コード読みなしで「どの瞬間に何が映っていたか」を確認できます。

            ### 🎨 視覚回帰テストで差分が出た場合

            - **baseline 未生成 (初回 or 新規 PNG 追加時)** → Actions → "E2E Visual Baseline" workflow を対象ブランチで手動実行 → PNG が自動 commit される
            - 意図したUI変更 → 同じく "E2E Visual Baseline" workflow を再実行
            - 意図しないUI変更 → コード側を修正

            <sub>PR #90 で導入、PR #93 で可視化強化、PR #96 で baseline 自動生成 workflow 追加。`.github/workflows/e2e.yml` + `e2e/README.md` 参照</sub>
